<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in — Heart Mind Trainer</title>
    <link rel="stylesheet" href="style.css?v=4" />
  </head>
  <body data-connect-page="login">
    <!-- LOGIN -->
    <section class="connect-screen" data-screen="login">
      <div class="phone">
        <h2>Welcome Back</h2>
        <p>Ready to continue your mind Training journey?</p>

        <form id="loginForm">
          <input type="email" name="email" placeholder="Enter email" required />
          <input type="password" name="password" placeholder="Password" required />

          <button type="submit" class="btn gradient">Log In</button>
        </form>

        <p id="loginMessage" style="color: red"></p>

        <p>Don't have an account? <a href="#signup" data-nav="signup">Sign Up</a></p>
        <br />
        <img src="../images/image.jpg" class="hero" alt="Hero" />
      </div>
    </section>

    <!-- SIGNUP -->
    <section class="connect-screen" data-screen="signup" hidden>
      <div class="phone">
        <p style="margin-bottom: 12px">
          <a href="index.html" style="color: #a03a96; font-weight: 600">← Home</a>
        </p>
        <h2>Create Your Account</h2>
        <p>Start Boost Memory and Reaction Skills.</p>

        <form id="signupForm">
          <input type="text" name="username" placeholder="Full Name" required />
          <input type="email" name="email" placeholder="Email" required />
          <input type="password" name="password" placeholder="Password" required />

          <button type="submit" class="btn gradient">Get Started</button>
        </form>

        <p id="signupMessage" style="color: red"></p>

        <p>Already have an account? <a href="#login" data-nav="login">Log In</a></p>
        <br />
        <img src="../images/image.jpg" class="hero" alt="Hero" />
      </div>
    </section>

    <script src="../controller/js/connect.js"></script>
  </body>
</html>
